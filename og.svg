  <text x="78" y="318" font-family="Helvetica, Arial, sans-serif" font-size="78" font-weight="600" fill="#f0f0f2" letter-spacing="-2.5">Big, fat prompts for</text>
  <text x="78" y="406" font-family="Helvetica, Arial, sans-serif" font-size="78" font-weight="600" fill="#f0f0f2" letter-spacing="-2.5">building better sites.</text>

